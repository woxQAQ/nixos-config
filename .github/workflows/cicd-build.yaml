name: Check
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  cicd-check:
    name: Build on ${{ matrix.system }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            os: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            auto-optimise-store = true
            allow-import-from-derivation = false
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes
            system = ${{ matrix.system }}
      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: woxqaq
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Check flake
        run: |
          nix flake check
      - name: Evaluate host configurations
        run: |
          nix eval .#nixosConfigurations.woxQAQ.config.system.build.toplevel.drvPath
          nix eval .#nixosConfigurations.wsl.config.system.build.toplevel.drvPath
          nix eval .#nixosConfigurations.windows-vm1.config.system.build.toplevel.drvPath
          nix eval .#darwinConfigurations.woxMac.config.system.build.toplevel.drvPath
